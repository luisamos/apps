templates:
  #================================================
  A4_HORIZONTAL_SCALE: !template
  #================================================
    reportTemplate: A4_HORIZONTAL.jrxml
    outputFilename: &OUTPUT_FILE_NAME "Geo Perú Mapa"
    pdfConfig: !pdfConfig
      compressed: true
    attributes:
      hasLegendOverflow: !boolean
        default: false
      title: !string
        default: &DEFAULT_TITLE "Geo Perú"
      scale: !string
        default: ""
      map: !map
        width: &A4_MAP_WIDTH_HORIZONTAL 650
        height: &A4_MAP_HEIGHT_HORIZONTAL 480
        maxDpi: &MAX_DPI 600
      overviewMap: !overviewMap
        width: 146
        height: 125
        maxDpi: 400
        default:
          dpi: 200
        zoomFactor: 9
      legend: !legend {}
      legendOverflow: !legend {}
      scalebar: !scalebar
        width: 106
        height: 21
        #createSubReport: false
        default:
          backgroundColor: "rgba(214, 214, 214, 200)"
          fontSize: 6
          intervals: 4
          barSize: 5
          align: "center"
          #geodetic: true
          lineWidth: 1
          unit: 'm'
      overlayLayers: &GRID_LAYER !staticLayers
        default:
          layers:
            - type: "grid"
              numberOfLines: [10, 10]
              labelColor: rgba(0,0,0,0)
              haloColor: rgba(0,0,0,0)
    processors:
      - !addBackgroundLayers
        inputMapper:
          overlayLayers: staticLayers
          map: map
      - !reportBuilder
        directory: "."
      - !createMap
        inputMapper:
          map: map
        outputMapper:
          mapSubReport: mapSubReport
          mapContext: mapContext
      - !createScalebar {}
      - !createOverviewMap {}
      - !prepareLegend # create a datasource for the report with the 'legend' attribute
        inputMapper:
          legend: legend
        outputMapper:
          legendSubReport: legendSubReport
          legendDataSource: legendDataSource
        maxWidth: 100
        # dpi: 150
        template: legend_vertical.jrxml
      - !prepareLegend # create a datasource for the report with the 'legend' attribute
        inputMapper:
          legendOverflow: legend
        outputMapper:
          legendSubReport: legendSubReportOverflow
          legendDataSource: legendDataSourceOverflow
          numberOfLegendRows: numberOfLegendRowsOverflow
        maxWidth: 100
        # dpi: 150
        template: legend_vertical.jrxml
